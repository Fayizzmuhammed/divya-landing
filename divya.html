<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divya | Online Opportunity</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Chettan+2:wght@400;600;700;800&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #CC0000;
    --blue2: #990000;
    --blue3: #FF4444;
    --dark: #100505;
    --glass: rgba(255,255,255,0.05);
    --glass-border: rgba(255,255,255,0.10);
    --glass-shine: rgba(255,255,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: #fff;
    font-family: 'Baloo Chettan 2', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Ambient background orbs */
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    opacity: 0.35;
  }
  .bg-orb-1 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #990000, transparent);
    top: -100px; left: -100px;
    animation: orbFloat1 8s ease-in-out infinite;
  }
  .bg-orb-2 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, #CC2200, transparent);
    bottom: -80px; right: -80px;
    animation: orbFloat2 10s ease-in-out infinite;
  }
  .bg-orb-3 {
    width: 200px; height: 200px;
    background: radial-gradient(circle, #FF4444, transparent);
    top: 40%; left: 60%;
    animation: orbFloat3 12s ease-in-out infinite;
    opacity: 0.15;
  }
  @keyframes orbFloat1 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(30px, 40px); }
  }
  @keyframes orbFloat2 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-25px, -35px); }
  }
  @keyframes orbFloat3 {
    0%, 100% { transform: translate(0, 0); }
    33% { transform: translate(20px, -20px); }
    66% { transform: translate(-20px, 10px); }
  }

  /* Grid lines background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(200,0,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,0,0,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
  }

  /* CARD */
  .card {
    position: relative;
    width: min(420px, 92vw);
    background: var(--glass);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--glass-border);
    border-radius: 28px;
    padding: 44px 36px 40px;
    text-align: center;
    overflow: hidden;
    animation: cardReveal 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    box-shadow:
      0 0 0 1px rgba(255,68,68,0.08),
      0 20px 60px rgba(0,0,0,0.5),
      0 0 80px rgba(200,0,0,0.08);
  }

  /* Glass shine top edge */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  }

  /* Subtle inner glow */
  .card::after {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(200,0,0,0.12), transparent 70%);
    pointer-events: none;
  }

  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(40px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* IMAGE */
  .avatar-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 28px;
    animation: avatarPop 0.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both, floating 3s 1.2s ease-in-out infinite;
  }
  .avatar-wrap img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255,68,68,0.4);
    box-shadow:
      0 0 0 6px rgba(200,0,0,0.08),
      0 0 30px rgba(200,0,0,0.4),
      0 0 60px rgba(200,0,0,0.2);
    display: block;
  }

  /* Spinning ring */
  .avatar-ring {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 1.5px solid transparent;
    border-top-color: rgba(255,68,68,0.8);
    border-right-color: rgba(255,68,68,0.3);
    animation: spin 3s linear infinite;
  }
  .avatar-ring-2 {
    position: absolute;
    inset: -16px;
    border-radius: 50%;
    border: 1px solid transparent;
    border-bottom-color: rgba(200,0,0,0.4);
    animation: spin 5s linear infinite reverse;
  }

  /* Pulse dot */
  .online-dot {
    position: absolute;
    bottom: 6px; right: 6px;
    width: 14px; height: 14px;
    background: #00FF88;
    border-radius: 50%;
    border: 2px solid var(--dark);
    box-shadow: 0 0 8px #00FF88;
    animation: pulseDot 2s ease-in-out infinite;
  }
  @keyframes pulseDot {
    0%, 100% { box-shadow: 0 0 6px #00FF88; }
    50% { box-shadow: 0 0 14px #00FF88, 0 0 20px rgba(0,255,136,0.4); }
  }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes floating {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  @keyframes avatarPop {
    from { opacity: 0; transform: scale(0.7); }
    to { opacity: 1; transform: scale(1); }
  }

  /* NAME */
  .name {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    background: linear-gradient(135deg, #fff 40%, rgba(255,100,100,0.9));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeUp 0.6s 0.4s ease both;
  }

  /* DIVIDER */
  .divider {
    width: 40px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #FF4444, transparent);
    margin: 14px auto 18px;
    border-radius: 2px;
    animation: fadeUp 0.6s 0.5s ease both;
  }

  /* MESSAGE BOX */
  .message-box {
    background: rgba(180,0,0,0.08);
    border: 1px solid rgba(255,68,68,0.15);
    border-radius: 16px;
    padding: 20px 20px;
    margin-bottom: 28px;
    animation: fadeUp 0.6s 0.6s ease both;
    position: relative;
    overflow: hidden;
  }
  .message-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,68,68,0.35), transparent);
  }
  .message-text {
    font-size: clamp(15px, 4vw, 17px);
    line-height: 1.8;
    color: rgba(255,255,255,0.88);
    font-weight: 600;
  }

  /* BUTTON */
  .join-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    background: linear-gradient(135deg, #AA0000, #FF3333);
    color: #fff;
    font-family: 'Baloo Chettan 2', sans-serif;
    font-size: 18px;
    font-weight: 800;
    padding: 16px 32px;
    border-radius: 14px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s 0.7s ease both, glowBtn 2.5s 1.5s ease-in-out infinite;
    transition: transform 0.2s, box-shadow 0.2s;
    letter-spacing: 0.3px;
  }
  .join-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -75%;
    width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: skewX(-20deg);
    animation: btnShine 3s 1.5s ease-in-out infinite;
  }
  .join-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(200,0,0,0.5);
  }
  .join-btn:active { transform: translateY(0); }
  @keyframes btnShine {
    0%, 100% { left: -75%; }
    50% { left: 125%; }
  }
  @keyframes glowBtn {
    0%, 100% { box-shadow: 0 4px 20px rgba(200,0,0,0.35); }
    50% { box-shadow: 0 4px 40px rgba(255,68,68,0.7), 0 0 60px rgba(200,0,0,0.2); }
  }

  /* Footer note */
  .footer-note {
    margin-top: 20px;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.5px;
    animation: fadeUp 0.6s 0.8s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Particle dots */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: rgba(255,68,68,0.5);
    animation: particleFloat linear infinite;
  }
</style>
</head>
